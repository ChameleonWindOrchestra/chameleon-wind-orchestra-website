<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Chameleon Wind Orchestra — Design System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-soft: #F5EFE6;
      --bg-card: #FFFEFB;
      --ink: #1F1A14;
      --ink-2: #3B342A;
      --ink-3: #5C5142;
      --ink-mute: #8A7F6E;
      --line: #E5DCCB;
      --line-soft: #EFE7D6;
      --accent: #C8631F;     /* 柿渋 — main */
      --accent-deep: #A24F18;
      --accent-soft: #E5A56A;
      --brown: #4A3525;       /* 焦茶 */
      --brown-deep: #2E1F13;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Noto Sans JP", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .ds-serif { font-family: "Noto Serif JP", "Times New Roman", serif; font-weight: 500; letter-spacing: 0.02em; }
    .ds-eng { font-family: "Cormorant Garamond", "Times New Roman", serif; font-style: italic; letter-spacing: 0.04em; }
    .ds-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ds-tokens.jsx"></script>
  <script type="text/babel" src="ds-components.jsx"></script>
  <script type="text/babel" src="ds-app.jsx"></script>
</body>
</html>
